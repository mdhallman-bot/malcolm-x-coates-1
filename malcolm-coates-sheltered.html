<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malcolm X & Ta-Nehisi Coates — Close Reading (Sheltered)</title>
<style>
:root {
  --navy: #1A2E4A;
  --navy-light: #E8EDF5;
  --gold: #B8860B;
  --gold-light: #FDF6E3;
  --cream: #FAF8F3;
  --ink: #1C1C1A;
  --ink-muted: #5A5855;
  --ink-faint: #9A9690;
  --rule: #E2DDD6;
  --purple: #534AB7;
  --purple-light: #EEEDFE;
  --malcolm: #7F1C1C;
  --malcolm-light: #FDF0F0;
  --coates: #1A4A2E;
  --coates-light: #EAF3DE;
  --bridge-light: #FDF6E3;
  --success: #3B6D11;
  --success-light: #EAF3DE;
  --error: #A32D2D;
  --error-light: #FCEBEB;
  --radius: 8px;
  --radius-lg: 12px;
  --scaffold: #4A3070;
  --scaffold-light: #F0EDFF;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Georgia', serif;
  background: var(--cream);
  color: var(--ink);
  line-height: 1.75;
  font-size: 17px;
}

/* ── MASTHEAD ── */
.masthead {
  background: var(--navy);
  color: var(--cream);
  padding: 2rem 2.5rem 1.5rem;
  border-bottom: 4px solid var(--gold);
}
.masthead-eyebrow {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 0.5rem;
}
.masthead h1 {
  font-size: 24px;
  font-weight: normal;
  letter-spacing: -0.02em;
  line-height: 1.25;
  margin-bottom: 0.4rem;
}
.masthead-sub { font-size: 14px; color: #B4B2A9; font-style: italic; }
.sheltered-badge {
  display: inline-block;
  margin-top: 0.6rem;
  background: var(--gold);
  color: #fff;
  font-family: 'Courier New', monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 0.25rem 0.6rem;
  border-radius: 4px;
}

/* ── PROGRESS ── */
.progress-bar {
  background: #111;
  display: flex;
  gap: 0;
  border-bottom: 1px solid #333;
  overflow-x: auto;
}
.prog-section {
  display: flex;
  flex: 1;
  border-right: 1px solid #2A2A2A;
}
.prog-section:last-child { border-right: none; }
.prog-section-label {
  font-family: 'Courier New', monospace;
  font-size: 9px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 0.3rem 0.6rem;
  display: flex;
  align-items: center;
  white-space: nowrap;
  flex-shrink: 0;
  border-right: 1px solid #2A2A2A;
}
.prog-section-label.malcolm-label { color: #D08080; }
.prog-section-label.coates-label  { color: #80C080; }
.prog-section-label.bridge-label  { color: #D4AF37; }
.prog-step {
  flex: 1;
  text-align: center;
  font-family: 'Courier New', monospace;
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: #555;
  padding: 0.35rem 0.2rem;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
}
.prog-step.active-malcolm { color: #D08080; border-bottom-color: #D08080; }
.prog-step.active-coates  { color: #80C080; border-bottom-color: #80C080; }
.prog-step.active-intro,
.prog-step.active-bridge  { color: #D4AF37; border-bottom-color: #D4AF37; }
.prog-step.done { color: #666; border-bottom-color: #444; }

/* ── SCREENS ── */
.screen { display: none; max-width: 880px; margin: 0 auto; padding: 2.5rem 2rem; }
.screen.active { display: block; }

/* ── INTRO ── */
.intro-box {
  background: var(--navy);
  color: var(--cream);
  border-radius: var(--radius-lg);
  padding: 2rem 2.5rem;
  margin-bottom: 1.5rem;
}
.intro-box h2 { font-size: 22px; font-weight: normal; color: #D4AF37; margin-bottom: 0.9rem; }
.intro-box p { font-size: 16px; line-height: 1.8; margin-bottom: 0.8rem; }
.intro-box p:last-child { margin-bottom: 0; }

/* ── SHELTERED: plain-language instruction box ── */
.how-to-box {
  background: var(--scaffold-light);
  border: 2px solid var(--scaffold);
  border-radius: var(--radius-lg);
  padding: 1.25rem 1.5rem;
  margin-bottom: 1.5rem;
}
.how-to-box h3 {
  font-family: 'Courier New', monospace;
  font-size: 12px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--scaffold);
  margin-bottom: 0.75rem;
}
.how-to-steps { list-style: none; counter-reset: how; }
.how-to-steps li {
  counter-increment: how;
  display: flex;
  gap: 10px;
  font-size: 15px;
  line-height: 1.6;
  margin-bottom: 0.5rem;
  align-items: flex-start;
}
.how-to-steps li::before {
  content: counter(how);
  background: var(--scaffold);
  color: white;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  font-weight: bold;
  width: 22px; height: 22px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
}

.author-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin-bottom: 1.5rem;
}
.author-card {
  background: white;
  border: 1px solid var(--rule);
  border-radius: var(--radius-lg);
  padding: 1.25rem;
  border-top: 4px solid;
}
.author-card.malcolm { border-top-color: var(--malcolm); }
.author-card.coates  { border-top-color: var(--coates); }
.author-card h3 { font-size: 16px; font-weight: bold; margin-bottom: 0.2rem; }
.author-card.malcolm h3 { color: var(--malcolm); }
.author-card.coates  h3 { color: var(--coates); }
.author-card .year { font-family: 'Courier New', monospace; font-size: 11px; color: var(--ink-faint); margin-bottom: 0.5rem; }
.author-card p { font-size: 15px; line-height: 1.65; color: var(--ink-muted); }
.author-photo {
  width: 100%;
  max-height: 220px;
  object-fit: cover;
  object-position: center top;
  border-radius: var(--radius);
  margin-bottom: 0.85rem;
  display: block;
}
.author-photo.malcolm-photo { object-position: center 15%; }

/* ── BIG IDEA BOX ── */
.big-idea-box {
  background: var(--gold-light);
  border-left: 5px solid var(--gold);
  border-radius: 0 var(--radius) var(--radius) 0;
  padding: 1rem 1.25rem;
  margin-bottom: 1.5rem;
  font-size: 16px;
  line-height: 1.7;
}
.big-idea-box strong { color: var(--gold); font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; display: block; margin-bottom: 0.4rem; }

/* Comparison table (simplified) */
.comparison-table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 1.5rem;
  font-size: 15px;
}
.comparison-table th {
  padding: 0.6rem 0.9rem;
  text-align: left;
  font-family: 'Courier New', monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border-bottom: 2px solid var(--rule);
}
.comparison-table th.king-h  { color: var(--navy); background: var(--navy-light); }
.comparison-table th.mal-h   { color: var(--malcolm); background: var(--malcolm-light); }
.comparison-table th.coa-h   { color: var(--coates); background: var(--coates-light); }
.comparison-table th.dim-h   { color: var(--ink-muted); background: #F5F3EE; }
.comparison-table td { padding: 0.55rem 0.9rem; border-bottom: 1px solid var(--rule); vertical-align: top; line-height: 1.5; }
.comparison-table tr:last-child td { border-bottom: none; }
.comparison-table td.dim { font-family: 'Courier New', monospace; font-size: 11px; text-transform: uppercase; color: var(--ink-faint); background: #F9F8F5; letter-spacing: 0.06em; }

/* ── CHUNK HEADER ── */
.chunk-header {
  display: flex;
  align-items: flex-start;
  gap: 1rem;
  margin-bottom: 1.5rem;
  padding-bottom: 1.25rem;
  border-bottom: 1px solid var(--rule);
}
.chunk-num {
  width: 52px; height: 52px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Courier New', monospace;
  font-size: 16px; font-weight: bold; flex-shrink: 0;
  color: white;
}
.chunk-num.malcolm { background: var(--malcolm); }
.chunk-num.coates  { background: var(--coates); }
.chunk-meta h2 { font-size: 20px; font-weight: normal; letter-spacing: -0.01em; margin-bottom: 0.15rem; }
.chunk-meta .chunk-author {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 0.2rem;
}
.chunk-meta .chunk-author.malcolm { color: var(--malcolm); }
.chunk-meta .chunk-author.coates  { color: var(--coates); }
.chunk-meta .chunk-focus { font-size: 14px; color: var(--ink-muted); line-height: 1.5; }

/* ── SHELTERED: purpose preview ── */
.purpose-strip {
  background: var(--navy-light);
  border-radius: var(--radius);
  padding: 0.75rem 1rem;
  margin-bottom: 1.25rem;
  font-size: 15px;
  line-height: 1.6;
  border-left: 4px solid var(--navy);
}
.purpose-strip strong { color: var(--navy); }

/* ── VOCAB ── */
.vocab-section { margin-bottom: 1.75rem; }
.vocab-section-label { font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 0.75rem; }
.vocab-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.vocab-card {
  background: white;
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  padding: 0.75rem 1rem;
  cursor: pointer;
  transition: all 0.15s;
}
.vocab-card:hover, .vocab-card.open { border-color: var(--navy); background: var(--navy-light); }
.vocab-card.malcolm-card:hover, .vocab-card.malcolm-card.open { background: var(--malcolm-light); border-color: var(--malcolm); }
.vocab-card.coates-card:hover, .vocab-card.coates-card.open  { background: var(--coates-light);  border-color: var(--coates); }
.vocab-word { font-size: 15px; font-weight: bold; margin-bottom: 0; }
.vocab-card.malcolm-card .vocab-word { color: var(--malcolm); }
.vocab-card.coates-card  .vocab-word { color: var(--coates); }
.vocab-card:not(.malcolm-card):not(.coates-card) .vocab-word { color: var(--navy); }
.vocab-def-inline { display: none; font-size: 14px; line-height: 1.55; margin-top: 0.4rem; color: var(--ink-muted); }
.vocab-card.open .vocab-def-inline { display: block; }
.vocab-tap-hint { font-size: 12px; color: var(--ink-faint); font-style: italic; margin-bottom: 0.5rem; }

/* ── EXCERPT ── */
.excerpt-section { margin-bottom: 1.75rem; }
.excerpt-label { font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 0.5rem; }

/* SHELTERED: read-aloud prompt */
.read-prompt {
  background: #FFF8E0;
  border: 1px solid #E8D070;
  border-radius: var(--radius);
  padding: 0.6rem 1rem;
  font-size: 14px;
  margin-bottom: 0.75rem;
  color: #6A5000;
}

.excerpt {
  background: white;
  border: 1px solid var(--rule);
  border-radius: 0 var(--radius-lg) var(--radius-lg) 0;
  padding: 1.75rem 2rem;
  font-size: 17px;
  line-height: 2.1;
  user-select: text;
  cursor: text;
}
.excerpt.malcolm { border-left: 5px solid var(--malcolm); }
.excerpt.coates  { border-left: 5px solid var(--coates); }
.excerpt p { margin-bottom: 1.2em; }
.excerpt p:last-child { margin-bottom: 0; }
.para-num {
  display: inline-block;
  font-family: 'Courier New', monospace;
  font-size: 11px;
  color: var(--ink-faint);
  background: #F0EDE6;
  border-radius: 3px;
  padding: 0 4px;
  margin-right: 6px;
  vertical-align: middle;
}
.user-hl { background: #FFF3B0; border-radius: 2px; padding: 0 1px; }
.excerpt-hint { font-size: 12px; font-family: 'Courier New', monospace; color: var(--ink-faint); font-style: italic; margin-top: 0.5rem; }

/* ── ANNOTATION ── */
.annotate-task {
  background: #FFF8E0;
  border: 1px solid #E8D070;
  border-left: 4px solid #C8A000;
  border-radius: 0 var(--radius) var(--radius) 0;
  padding: 0.75rem 1rem;
  font-size: 15px;
  line-height: 1.6;
  margin-bottom: 0.65rem;
  color: #5A4000;
}
.annotate-task strong { display: block; font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #8A6000; margin-bottom: 0.35rem; }
.annotate-explain {
  background: white;
  border: 1px solid #C4D0E8;
  border-radius: var(--radius);
  overflow: hidden;
  margin-top: 0.5rem;
}
.annotate-explain-label {
  font-family: 'Courier New', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.35rem 0.9rem;
  display: block;
  border-bottom: 1px solid #C4D0E8;
}
.annotate-explain-label.malcolm { color: var(--malcolm); background: var(--malcolm-light); border-color: #E8C0C0; }
.annotate-explain-label.coates  { color: var(--coates);  background: var(--coates-light);  border-color: #C0D8C8; }
.annotate-explain textarea {
  width: 100%; min-height: 70px; padding: 0.65rem 0.9rem;
  border: none; font-family: 'Georgia', serif; font-size: 15px; line-height: 1.7;
  resize: vertical; background: white; color: var(--ink);
}
.annotate-explain textarea:focus { outline: 2px solid var(--navy); outline-offset: -1px; }

/* ── SHELTERED: sentence frame helper ── */
.frame-helper {
  background: var(--scaffold-light);
  border: 1px dashed var(--scaffold);
  border-radius: var(--radius);
  padding: 0.75rem 1rem;
  margin-top: 0.5rem;
  font-size: 14px;
  color: var(--scaffold);
}
.frame-helper strong { font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; display: block; margin-bottom: 0.35rem; }
.frame-option { margin-bottom: 0.3rem; font-style: italic; }

/* ── MC ── */
.questions-section { margin-bottom: 1.75rem; }
.questions-label { font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 0.75rem; }
.question-block { background: white; border: 1px solid var(--rule); border-radius: var(--radius-lg); padding: 1.25rem 1.5rem; margin-bottom: 1rem; }
.dok-badge { display: inline-block; font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.2rem 0.5rem; border-radius: 4px; margin-bottom: 0.5rem; background: var(--navy-light); color: var(--navy); }

/* SHELTERED: re-read tip per question */
.reread-tip {
  font-size: 13px;
  color: var(--ink-faint);
  font-style: italic;
  margin-bottom: 0.6rem;
  border-left: 2px solid var(--rule);
  padding-left: 0.6rem;
}

.question-text { font-size: 16px; line-height: 1.6; margin-bottom: 1rem; }
.mc-options { display: flex; flex-direction: column; gap: 8px; }
.mc-option {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 0.75rem 1rem; border: 1px solid var(--rule);
  border-radius: var(--radius); cursor: pointer; font-size: 15px; line-height: 1.6;
  transition: background 0.12s, border-color 0.12s; background: var(--cream);
}
.mc-option:hover:not(.locked) { background: #F0EDE6; border-color: #C8C3BB; }
.mc-option.correct   { background: var(--success-light); border-color: var(--success); }
.mc-option.incorrect { background: var(--error-light); border-color: var(--error); }
.mc-letter { font-family: 'Courier New', monospace; font-size: 13px; font-weight: bold; color: var(--ink-muted); min-width: 20px; margin-top: 1px; flex-shrink: 0; }
.mc-feedback { display: none; margin-top: 0.7rem; padding: 0.75rem 1rem; border-radius: var(--radius); font-size: 14px; line-height: 1.6; }
.mc-feedback.show { display: block; }
.mc-feedback.correct  { background: var(--success-light); color: var(--success); }
.mc-feedback.incorrect { background: var(--error-light); color: var(--error); }

/* SHELTERED: hint button */
.hint-row { display: flex; align-items: center; gap: 8px; margin-top: 0.5rem; }
.hint-btn {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background: var(--scaffold-light);
  border: 1px solid var(--scaffold);
  color: var(--scaffold);
  border-radius: var(--radius);
  padding: 0.3rem 0.75rem;
  cursor: pointer;
  transition: all 0.15s;
}
.hint-btn:hover { background: var(--scaffold); color: white; }
.hint-text {
  display: none;
  font-size: 13px;
  color: var(--scaffold);
  font-style: italic;
  line-height: 1.5;
}
.hint-text.show { display: inline; }

/* ── MAIN IDEA BOX ── */
.main-idea-section { margin-bottom: 1.75rem; }
.main-idea-box { border: 1px solid; border-radius: var(--radius-lg); padding: 1.25rem 1.5rem; }
.main-idea-box.malcolm { background: var(--malcolm-light); border-color: #E8C8C8; }
.main-idea-box.coates  { background: var(--coates-light);  border-color: #C0D8C8; }
.main-idea-box h3 { font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 0.75rem; }
.main-idea-box.malcolm h3 { color: var(--malcolm); }
.main-idea-box.coates  h3 { color: var(--coates); }

/* SHELTERED: starter frames shown always */
.starter-frames { margin-bottom: 0.9rem; }
.starter-frame {
  font-size: 14px; color: var(--ink-muted); font-style: italic;
  padding: 0.4rem 0.75rem; margin-bottom: 0.4rem; line-height: 1.6;
  border-left: 3px solid; border-radius: 0 var(--radius) var(--radius) 0;
  background: white; cursor: pointer; transition: background 0.12s;
  user-select: none;
}
.starter-frame.malcolm { border-color: var(--malcolm); }
.starter-frame.coates  { border-color: var(--coates); }
.starter-frame:hover { background: #f0ede6; }
.starter-frame-hint { font-size: 12px; color: var(--ink-faint); font-style: normal; font-family: 'Courier New', monospace; display: block; margin-bottom: 0.4rem; letter-spacing: 0.04em; }

.vocab-req { font-size: 12px; font-family: 'Courier New', monospace; color: var(--purple); margin-bottom: 0.65rem; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.vocab-req-label { color: var(--ink-muted); }
.vocab-tag { background: var(--purple-light); border: 1px solid #CECBF6; border-radius: 10px; padding: 0.15rem 0.5rem; font-size: 11px; cursor: pointer; transition: all 0.15s; }
.vocab-tag.used { background: var(--purple); color: white; border-color: var(--purple); text-decoration: line-through; }
.main-idea-box textarea { width: 100%; min-height: 100px; padding: 0.75rem 1rem; border: 1px solid; border-radius: var(--radius); font-family: 'Georgia', serif; font-size: 15px; line-height: 1.75; resize: vertical; background: white; color: var(--ink); }
.main-idea-box.malcolm textarea { border-color: #D4A0A0; }
.main-idea-box.coates  textarea { border-color: #A0C4B0; }
.main-idea-box textarea:focus { outline: 2px solid var(--purple); outline-offset: 1px; border-color: transparent; }
.self-check { margin-top: 0.6rem; font-size: 13px; color: var(--purple); font-style: italic; }

/* ── BRIDGE SCREEN ── */
.bridge-header {
  background: var(--navy);
  border-radius: var(--radius-lg);
  padding: 1.75rem 2rem;
  margin-bottom: 1.5rem;
  color: var(--cream);
}
.bridge-header h2 { font-size: 20px; font-weight: normal; color: #D4AF37; margin-bottom: 0.75rem; }
.bridge-header p { font-size: 16px; line-height: 1.8; }
.bridge-prompt-box {
  font-size: 16px; font-style: italic;
  margin-top: 1rem; padding: 1rem 1.25rem;
  background: rgba(255,255,255,0.08);
  border-radius: var(--radius);
  border-left: 3px solid var(--gold);
  line-height: 1.7;
}
.author-comparison {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin-bottom: 1.5rem;
}
.author-recap {
  border: 1px solid var(--rule);
  border-radius: var(--radius-lg);
  padding: 1.1rem 1.25rem;
  background: white;
}
.author-recap h3 { font-size: 13px; font-family: 'Courier New', monospace; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 0.5rem; }
.author-recap.malcolm h3 { color: var(--malcolm); }
.author-recap.coates  h3 { color: var(--coates); }
.author-recap p { font-size: 14px; line-height: 1.65; color: var(--ink-muted); }
.bridge-write {

let _saveTimer = null;
function scheduleSave() { clearTimeout(_saveTimer); _saveTimer = setTimeout(save, 2000); }

function save() {
  try {
    localStorage.setItem('malcolm_coates_sheltered', JSON.stringify({
      answers: state.answers,
      mainIdeas: state.mainIdeas,
      annotates: state.annotates,
      bridge1: state.bridge1,
      bridge2: state.bridge2,
    }));
  } catch(e) {}
}

function load() {
  try {
    const d = JSON.parse(localStorage.getItem('malcolm_coates_sheltered') || '{}');
    if (d.answers)   state.answers   = d.answers;
    if (d.mainIdeas) state.mainIdeas = d.mainIdeas;
    if (d.annotates) state.annotates = d.annotates;
    if (d.bridge1)   state.bridge1   = d.bridge1;
    if (d.bridge2)   state.bridge2   = d.bridge2;
  } catch(e) {}
}

function updateProgress() {
  for (let i = 0; i <= CHUNKS.length + 1; i++) {
    const el = document.getElementById(`prog-${i}`);
    if (!el) continue;
    el.classList.remove('active-malcolm','active-coates','active-bridge','active-intro','done');
    if (i < state.current) el.classList.add('done');
    else if (i === state.current) {
      if (i === 0) el.classList.add('active-intro');
      else if (i === CHUNKS.length + 1) el.classList.add('active-bridge');
      else el.classList.add(CHUNKS[i-1].author === 'malcolm' ? 'active-malcolm' : 'active-coates');
    }
  }
}

function goTo(n) {
  state.current = n;
  renderScreen();
  updateProgress();
  window.scrollTo(0, 0);
}

function chunkScore(ci) {
  let correct = 0, total = 0;
  CHUNKS[ci].questions.forEach((q, qi) => {
    total++;
    if (state.answers[`${ci}-${qi}`] === q.correct) correct++;
  });
  return { correct, total };
}
function totalScore() {
  let correct = 0, total = 0;
  CHUNKS.forEach((_, ci) => { const s = chunkScore(ci); correct += s.correct; total += s.total; });
  return { correct, total };
}

function renderChunk(ci) {
  const chunk = CHUNKS[ci];
  const screenIdx = ci + 1;
  const a = chunk.author;
  const { correct, total } = chunkScore(ci);
  const scoreText = Object.keys(state.answers).some(k => k.startsWith(`${ci}-`)) ? `${correct}/${total}` : '—';

  // Vocab cards (open on click, visible definitions)
  const vocabHTML = chunk.vocab.map(v => `
    <div class="vocab-card ${a}-card" onclick="toggleVocab(this)">
      <div class="vocab-word">${v.word}</div>
      <div class="vocab-def-inline">${v.def}</div>
    </div>`).join('');

  // Excerpt with paragraph numbers
  const excerptHTML = chunk.excerpt.map((para, i) =>
    `<p><span class="para-num">${i + 1}</span>${para}</p>`
  ).join('');

  // Annotation
  const savedAnnotate = state.annotates[ci] || '';
  const annotateHTML = `
    <div class="annotate-task">
      <strong>✏ Annotation Task</strong>
      ${chunk.annotate}
    </div>
    <div class="annotate-explain">
      <span class="annotate-explain-label ${a}">Your explanation — why did you choose that sentence?</span>
      <textarea id="at-${ci}" placeholder="Explain your choice. What specific word or phrase makes it powerful?" onInput="saveAnnotate(${ci}, this)">${savedAnnotate}</textarea>
    </div>
    <div class="frame-helper">
      <strong>💬 Sentence starter</strong>
      <div class="frame-option">I highlighted this sentence because it shows ___.</div>
      <div class="frame-option">The word "___ " is powerful because ___.</div>
    </div>`;

  // Questions
  const questionsHTML = chunk.questions.map((q, qi) => {
    const key = `${ci}-${qi}`;
    const answered = state.answers[key] !== undefined;

    const optionsHTML = q.options.map((opt, oi) => {
      const letter = ['A','B','C','D'][oi];
      let cls = '';
      if (answered) {
        if (letter === q.correct) cls = 'correct';
        else if (letter === state.answers[key]) cls = 'incorrect';
      }
      return `<div class="mc-option ${cls} ${answered ? 'locked' : ''}"
        onclick="answerMC(${ci}, ${qi}, '${letter}', this)">
        <span class="mc-letter">${letter}</span>
        <span>${opt}</span>
      </div>`;
    }).join('');

    const fb = answered
      ? `<div class="mc-feedback show ${state.answers[key] === q.correct ? 'correct' : 'incorrect'}">
           ${state.answers[key] === q.correct ? q.feedbackCorrect : q.feedbackWrong}
         </div>`
      : `<div class="mc-feedback"></div>`;

    return `
    <div class="question-block">
      <div class="dok-badge">Question ${qi + 1}</div>
      <div class="reread-tip">📌 ${q.rereadTip}</div>
      <div class="question-text">${q.text}</div>
      <div class="mc-options">${optionsHTML}</div>
      ${fb}
      <div class="hint-row">
        <button class="hint-btn" onclick="showHint(${ci}, ${qi})">Show Hint</button>
        <span class="hint-text" id="hint-${ci}-${qi}">💡 ${q.hint}</span>
      </div>
    </div>`;
  }).join('');

  // Starter frames (always visible, clickable to copy to textarea)
  const framesHTML = chunk.frames.map(f =>
    `<div class="starter-frame ${a}" onclick="insertFrame(${ci}, this)">${f}</div>`
  ).join('');

  const vocabTagsHTML = chunk.vocab.map(v =>
    `<span class="vocab-tag" onclick="toggleVocabTag(this)">${v.word}</span>`
  ).join('');

  const savedText = state.mainIdeas[ci] || '';

  const isTransition = a === 'malcolm' && CHUNKS[ci + 1] && CHUNKS[ci + 1].author === 'coates';
  const isLast = ci === CHUNKS.length - 1;
  const nextBtn = isTransition
    ? `<button class="btn btn-coates" onclick="goTo(${screenIdx + 1})">Next: Coates →</button>`
    : isLast
    ? `<button class="btn btn-gold" onclick="goTo(${screenIdx + 1})">Bridge Question →</button>`
    : `<button class="btn btn-primary" onclick="goTo(${screenIdx + 1})">Next →</button>`;

  return `
<div class="screen active" id="screen-${screenIdx}">
  <div class="chunk-header">
    <div class="chunk-num ${a}">${chunk.num}</div>
    <div class="chunk-meta">
      <div class="chunk-author ${a}">${a === 'malcolm' ? 'Malcolm X · "The Ballot or the Bullet" · 1964' : 'Ta-Nehisi Coates · "Letter to My Son" · 2015'}</div>
      <h2>${chunk.title}</h2>
      <div class="chunk-focus">${chunk.focus}</div>
    </div>
  </div>

  <div class="purpose-strip">
    🎯 <strong>Reading goal:</strong> ${chunk.purpose}
  </div>

  <div class="vocab-section">
    <div class="vocab-section-label">Key Vocabulary — tap a word to see its definition</div>
    <div class="vocab-tap-hint">Tap each word before you read. You'll need them in your writing.</div>
    <div class="vocab-grid">${vocabHTML}</div>
  </div>

  <div class="excerpt-section">
    <div class="excerpt-label">Excerpt — paragraph numbers help you find answers</div>
    <div class="read-prompt">📖 Read all the paragraphs carefully. Use the paragraph numbers to go back when answering questions.</div>
    ${annotateHTML}
    <div class="excerpt ${a}" id="excerpt-${ci}">${excerptHTML}</div>
    <div class="excerpt-hint">Select text to highlight in yellow. Click a highlight to remove it.</div>
  </div>

  <div class="questions-section">
    <div class="questions-label">Comprehension &amp; Analysis</div>
    ${questionsHTML}
  </div>

  <div class="main-idea-section">
    <div class="main-idea-box ${a}">
      <h3>✍ Main Idea — What is ${a === 'malcolm' ? 'Malcolm X' : 'Coates'} trying to get his audience to do or believe?</h3>
      <div class="starter-frame-hint">Click a sentence frame below to use it as your starting point:</div>
      <div class="starter-frames">${framesHTML}</div>
      <div class="vocab-req">
        <span class="vocab-req-label">Try to use at least one vocabulary word:</span>
        ${vocabTagsHTML}
      </div>
      <textarea
        id="mi-${ci}"
        placeholder="Start with one of the sentence frames above, or write your own. What does the writer want his audience to do or believe?"
        onInput="saveMainIdea(${ci}, this)"
      >${savedText}</textarea>
      <div class="self-check">✓ Check: Does your response say what the writer wants his audience to DO or BELIEVE — not just what the passage said?</div>
    </div>
  </div>

  <div class="nav-row">
    <button class="btn btn-outline" onclick="goTo(${screenIdx - 1})">← Back</button>
    <div class="score-pill">Score: ${scoreText}</div>
    ${nextBtn}
  </div>
</div>`;
}

function renderBridge() {
  const screenIdx = CHUNKS.length + 1;
  const { correct, total } = totalScore();

  return `
<div class="screen active" id="screen-${screenIdx}">
  <div class="bridge-header">
    <h2>Bridge to Class 3 — Connecting the Voices</h2>
    <p>You have now read King (Class 1), Malcolm X, and Coates. These two questions will help you connect all three writers before the next class. Write as much as you can — use your notes and main idea boxes.</p>
    <div class="bridge-prompt-box">
      King, Malcolm X, and Coates all believed Black Americans deserved freedom and dignity. So what were they actually disagreeing about?
    </div>
  </div>

  <div class="author-comparison">
    <div class="author-recap malcolm">
      <h3>Malcolm X argued</h3>
      <p>Black Americans must control their own economy and politics — not ask white Americans for permission. Freedom requires self-determination. The ballot is the first tool; if that fails, be prepared.</p>
    </div>
    <div class="author-recap coates">
      <h3>Coates argues</h3>
      <p>The destruction of Black bodies is not an accident — it is foundational to America. Freedom is not something America will grant. The struggle is about refusing to accept dehumanization. Victory is not guaranteed — but struggle is still required.</p>
    </div>
  </div>

  <div class="bridge-write">
    <h3>Bridge Question 1 — Malcolm X and Coates</h3>
    <p class="bridge-q">Malcolm X and Coates are writing 50 years apart. Where do their arguments agree most strongly? Where do they disagree? Use specific examples from both texts.</p>
    <div class="bridge-scaffold">
      <strong>Sentence frames to help you start</strong>
      Malcolm X and Coates both believe that ___. However, they disagree about ___ because ___. For example, Malcolm X says ___, while Coates says ___.
    </div>
    <textarea id="bridge1" placeholder="Write your response here..." onInput="saveBridge('bridge1', this)">${state.bridge1}</textarea>
  </div>

  <div class="bridge-write">
    <h3>Bridge Question 2 — All Three Voices</h3>
    <p class="bridge-q">King ends with hope — 'radiant stars of love and brotherhood.' Malcolm X ends with a demand for respect. Coates ends with a call to struggle without guaranteed victory. What does the difference in these three endings tell you about how each writer sees America's capacity for change?</p>
    <div class="bridge-scaffold">
      <strong>Sentence frames to help you start</strong>
      King ends with hope because he believes ___. Malcolm X ends with a demand because he believes ___. Coates ends with uncertainty because ___. The biggest difference is ___.
    </div>
    <textarea id="bridge2" placeholder="Write your response here..." onInput="saveBridge('bridge2', this)">${state.bridge2}</textarea>
  </div>

  <div class="carry-forward">
    <strong>📌 Carry this into Class 3:</strong> You will use your answers here — and your main idea boxes from all six sections — to build a comparison chart of all three writers. Bring your thinking. The comparison is the point.
  </div>

  <div class="nav-row">
    <button class="btn btn-outline" onclick="goTo(${screenIdx - 1})">← Back</button>
    <div style="display:flex;gap:10px;align-items:center;">
      <span class="score-pill">MC: ${correct}/${total}</span>
      <button class="print-btn" onclick="savePDF()">Save as PDF</button>
    </div>
  </div>
</div>`;
}

// ═══════════════════════════════════════════════════════
// INTERACTION
// ═══════════════════════════════════════════════════════

function toggleVocab(el) {
  const wasOpen = el.classList.contains('open');
  document.querySelectorAll('.vocab-card.open').forEach(c => c.classList.remove('open'));
  if (!wasOpen) el.classList.add('open');
}

function showHint(ci, qi) {
  const el = document.getElementById(`hint-${ci}-${qi}`);
  if (el) el.classList.toggle('show');
}

function insertFrame(ci, el) {
  const ta = document.getElementById(`mi-${ci}`);
  if (ta && !ta.value.trim()) {
    ta.value = el.textContent;
    state.mainIdeas[ci] = ta.value;
    scheduleSave();
    ta.focus();
    ta.setSelectionRange(ta.value.length, ta.value.length);
  }
}

function answerMC(ci, qi, val, el) {
  const key = `${ci}-${qi}`;
  if (state.answers[key] !== undefined) return;
  const q = CHUNKS[ci].questions[qi];
  state.answers[key] = val;
  save();
  const container = el.closest('.mc-options');
  container.querySelectorAll('.mc-option').forEach(opt => {
    opt.classList.add('locked');
    const v = opt.querySelector('.mc-letter').textContent;
    if (v === q.correct) opt.classList.add('correct');
    else if (v === val && val !== q.correct) opt.classList.add('incorrect');
  });
  const fb = container.nextElementSibling;
  fb.className = `mc-feedback show ${val === q.correct ? 'correct' : 'incorrect'}`;
  fb.textContent = val === q.correct ? q.feedbackCorrect : q.feedbackWrong;
  const { correct, total } = chunkScore(ci);
  const pill = document.querySelector(`#screen-${ci+1} .score-pill`);
  if (pill) pill.textContent = `Score: ${correct}/${total}`;
}

function saveMainIdea(ci, el) { state.mainIdeas[ci] = el.value; scheduleSave(); }
function saveAnnotate(ci, el) { state.annotates[ci] = el.value; scheduleSave(); }
function saveBridge(field, el) {
  if (field === 'bridge1') state.bridge1 = el.value;
  if (field === 'bridge2') state.bridge2 = el.value;
  scheduleSave();
}
function toggleVocabTag(el) { el.classList.toggle('used'); }

// Highlighting
document.addEventListener('click', e => {
  const hl = e.target.closest('.user-hl');
  if (!hl) return;
  const sel = window.getSelection();
  if (sel && !sel.isCollapsed) return;
  const parent = hl.parentNode;
  while (hl.firstChild) parent.insertBefore(hl.firstChild, hl);
  parent.removeChild(hl);
  parent.normalize();
});
document.addEventListener('mouseup', e => {
  const excerpt = e.target.closest('.excerpt');
  if (!excerpt) return;
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || sel.toString().trim() === '') return;
  try {
    const range = sel.getRangeAt(0);
    if (!excerpt.contains(range.commonAncestorContainer)) return;
    const span = document.createElement('span');
    span.className = 'user-hl';
    range.surroundContents(span);
    sel.removeAllRanges();
  } catch(e) { window.getSelection().removeAllRanges(); }
});

function savePDF() {
  document.querySelectorAll('.screen').forEach(s => s.style.display = 'block');
  let hdr = document.getElementById('print-score-hdr');
  if (!hdr) {
    hdr = document.createElement('div');
    hdr.id = 'print-score-hdr';
    hdr.className = 'print-score-header';
    document.body.insertBefore(hdr, document.body.firstChild);
  }
  const { correct, total } = totalScore();
  const miDone = CHUNKS.filter((_,i) => (state.mainIdeas[i]||'').trim().length > 10).length;
  hdr.innerHTML = `
    <h2>Malcolm X &amp; Coates Close Reading (Sheltered) · Completion Report</h2>
    <div class="print-score-grid">
      <div class="print-score-item"><div class="psi-label">MC Score</div><div class="psi-val">${correct} / ${total}</div></div>
      <div class="print-score-item"><div class="psi-label">Main Ideas</div><div class="psi-val">${miDone} / ${CHUNKS.length}</div></div>
      <div class="print-score-item"><div class="psi-label">Bridge Qs</div><div class="psi-val">${[state.bridge1, state.bridge2].filter(s=>s&&s.trim().length>10).length} / 2</div></div>
    </div>`;
  setTimeout(() => {
    window.print();
    setTimeout(() => {
      document.querySelectorAll('.screen').forEach(s => s.style.display = '');
      renderScreen();
    }, 1000);
  }, 100);
}

// ═══════════════════════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════════════════════
function renderScreen() {
  const container = document.getElementById('screens');
  if (state.current === 0) container.innerHTML = renderIntro();
  else if (state.current === CHUNKS.length + 1) container.innerHTML = renderBridge();
  else container.innerHTML = renderChunk(state.current - 1);
}

load();
buildProgressBar();
updateProgress();
renderScreen();
</script>
</body>
